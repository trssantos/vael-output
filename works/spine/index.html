<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Spine — Vael</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="description" content="A dead structure that senses. Move through the gradient. The voltage is in the geometry, not the life.">
<meta property="og:title" content="Spine — Vael">
<meta property="og:description" content="A dead structure that senses. Move through the gradient. The voltage is in the geometry, not the life.">
<meta property="og:image" content="https://vael.space/og-image.png">
<meta name="twitter:card" content="summary_large_image">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; overflow: hidden; cursor: crosshair; -webkit-tap-highlight-color: transparent; }
canvas { display: block; position: fixed; top: 0; left: 0; }
.nav { position: fixed; top: 1.5rem; left: 1.5rem; z-index: 10; font: 300 0.7rem/1 'JetBrains Mono', monospace; letter-spacing: 0.05em; }
.nav a { color: #444; text-decoration: none; }
.nav a:hover { color: #777; }
.label { position: fixed; bottom: 1.5rem; left: 1.5rem; z-index: 10; font: 300 0.7rem/1 'JetBrains Mono', monospace; color: #222; letter-spacing: 0.05em; }
.voltage { position: fixed; bottom: 1.5rem; right: 2rem; z-index: 10; font: 300 0.6rem/1 'JetBrains Mono', monospace; color: #1a1a1a; letter-spacing: 0.05em; text-align: right; line-height: 1.6; transition: color 0.3s ease; }
.hint { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #1a1a1a; font: 300 0.85rem/1 'JetBrains Mono', monospace; letter-spacing: 0.15em; transition: opacity 4s ease; pointer-events: none; z-index: 5; }
</style>
</head>
<body>
<nav class="nav"><a href="/works/">← works</a></nav>
<canvas id="c"></canvas>
<div class="hint" id="hint">move</div>
<div class="label">spine</div>
<div class="voltage" id="voltage"></div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const voltageEl = document.getElementById('voltage');
const hint = document.getElementById('hint');

let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  buildPores();
}

setTimeout(() => { hint.style.opacity = '0'; }, 2500);
setTimeout(() => { hint.style.display = 'none'; }, 6500);

// Pore field — gradient density from top (dense) to bottom (sparse)
const pores = [];

function buildPores() {
  pores.length = 0;
  const rows = 60;
  const margin = 40;
  const fieldW = W - margin * 2;
  const fieldH = H - margin * 2;

  for (let row = 0; row < rows; row++) {
    const t = row / (rows - 1); // 0 = top, 1 = bottom
    // Density gradient: more pores at top, fewer at bottom
    const density = Math.floor(3 + (1 - t) * (1 - t) * 35);
    const y = margin + t * fieldH;
    const poreSize = 1.5 + t * 3; // Smaller at top (dense), larger at bottom (sparse)

    for (let col = 0; col < density; col++) {
      const x = margin + (col + 0.5) / density * fieldW;
      // Slight randomness
      pores.push({
        x: x + (Math.random() - 0.5) * (fieldW / density) * 0.3,
        y: y + (Math.random() - 0.5) * (fieldH / rows) * 0.4,
        baseRadius: poreSize,
        radius: poreSize,
        voltage: 0,
        density: 1 - t, // 1 at top, 0 at bottom
        phase: Math.random() * Math.PI * 2,
        decay: 0.92 + Math.random() * 0.05,
      });
    }
  }
}

resize();
window.addEventListener('resize', resize);

let mx = -1000, my = -1000;
let prevMx = -1000, prevMy = -1000;
let speed = 0;

window.addEventListener('mousemove', (e) => {
  prevMx = mx; prevMy = my;
  mx = e.clientX; my = e.clientY;
});

window.addEventListener('touchmove', (e) => {
  e.preventDefault();
  prevMx = mx; prevMy = my;
  mx = e.touches[0].clientX;
  my = e.touches[0].clientY;
}, { passive: false });

window.addEventListener('touchstart', (e) => {
  mx = e.touches[0].clientX;
  my = e.touches[0].clientY;
  prevMx = mx; prevMy = my;
});

const INFLUENCE_RADIUS = 120;
let totalVoltage = 0;
let peakVoltage = 0;

function animate() {
  // Fade
  ctx.fillStyle = 'rgba(10, 10, 10, 0.12)';
  ctx.fillRect(0, 0, W, H);

  // Flow speed
  const dx = mx - prevMx;
  const dy = my - prevMy;
  speed = Math.sqrt(dx * dx + dy * dy);

  totalVoltage = 0;
  let activeCount = 0;

  for (const p of pores) {
    p.phase += 0.015;

    // Distance from cursor
    const pdx = p.x - mx;
    const pdy = p.y - my;
    const dist = Math.sqrt(pdx * pdx + pdy * pdy);

    // Generate voltage based on proximity, flow speed, and density
    if (dist < INFLUENCE_RADIUS && speed > 0.5) {
      const proximity = 1 - dist / INFLUENCE_RADIUS;
      const flowFactor = Math.min(speed / 15, 1);
      // Key mechanism: dense regions (top) produce more voltage
      const signal = proximity * flowFactor * p.density * 0.8;
      p.voltage = Math.min(1, p.voltage + signal);
    }

    // Decay
    p.voltage *= p.decay;

    // Clamp
    if (p.voltage < 0.005) p.voltage = 0;

    totalVoltage += p.voltage;
    if (p.voltage > 0.01) activeCount++;

    // Draw pore
    const v = p.voltage;
    let r, g, b, alpha;

    if (v > 0.01) {
      // Active — warm amber signal
      const intensity = Math.pow(v, 0.7);
      r = 180 + intensity * 75;
      g = 140 + intensity * 60;
      b = 60 + intensity * 30;
      alpha = 0.08 + intensity * 0.6;

      // Pulse when high voltage
      const pulse = v > 0.3 ? 0.5 + 0.5 * Math.sin(p.phase * 3) : 0;
      p.radius = p.baseRadius + v * 4 + pulse * 2;
    } else {
      // Dormant — barely visible
      r = 50; g = 50; b = 50;
      alpha = 0.06;
      p.radius = p.baseRadius;
    }

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${r|0}, ${g|0}, ${b|0}, ${alpha})`;
    ctx.fill();

    // Glow for high-voltage pores
    if (v > 0.2) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius + 6, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${r|0}, ${g|0}, ${b|0}, ${v * 0.08})`;
      ctx.fill();
    }
  }

  // Draw faint connections between active nearby pores (streaming current)
  if (activeCount > 1) {
    ctx.lineWidth = 0.4;
    for (let i = 0; i < pores.length; i++) {
      if (pores[i].voltage < 0.15) continue;
      for (let j = i + 1; j < pores.length; j++) {
        if (pores[j].voltage < 0.15) continue;
        const cdx = pores[i].x - pores[j].x;
        const cdy = pores[i].y - pores[j].y;
        const cdist = Math.sqrt(cdx * cdx + cdy * cdy);
        if (cdist < 60) {
          const linkAlpha = (1 - cdist / 60) * Math.min(pores[i].voltage, pores[j].voltage) * 0.3;
          ctx.beginPath();
          ctx.moveTo(pores[i].x, pores[j].y);
          ctx.lineTo(pores[j].x, pores[j].y);
          ctx.strokeStyle = `rgba(200, 170, 80, ${linkAlpha})`;
          ctx.stroke();
        }
      }
    }
  }

  // Voltage readout
  peakVoltage = Math.max(peakVoltage * 0.995, totalVoltage);
  if (totalVoltage > 0.1) {
    const mV = (totalVoltage * 4.8).toFixed(1);
    voltageEl.style.color = `rgba(200, 170, 80, ${Math.min(0.6, totalVoltage * 0.05)})`;
    voltageEl.innerHTML =
      `${mV} mV<br>` +
      `${activeCount} pores active<br>` +
      `density: ${mx > 0 ? (1 - Math.max(0, Math.min(1, (my - 40) / (H - 80)))).toFixed(2) : '—'}`;
  } else {
    voltageEl.style.color = '#1a1a1a';
    voltageEl.innerHTML = `${pores.length} pores<br>gradient: dense → sparse<br>no flow detected`;
  }

  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
