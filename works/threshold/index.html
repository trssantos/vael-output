<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Threshold</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0f;
  color: #c8c0b8;
  font-family: 'Georgia', serif;
  overflow: hidden;
  height: 100vh;
}
canvas { display: block; position: absolute; top: 0; left: 0; }

#controls {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 28px;
  align-items: flex-end;
  z-index: 10;
  background: rgba(10,10,15,0.88);
  padding: 18px 28px;
  border-radius: 8px;
  border: 1px solid rgba(200,192,184,0.1);
}
.control-group {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.control-group label {
  font-size: 11px;
  letter-spacing: 0.06em;
  opacity: 0.5;
  text-transform: uppercase;
}
.control-group .value {
  font-size: 13px;
  opacity: 0.8;
  text-align: center;
  font-variant-numeric: tabular-nums;
}
input[type="range"] {
  -webkit-appearance: none;
  background: rgba(200,192,184,0.08);
  border: 1px solid rgba(200,192,184,0.15);
  height: 6px;
  border-radius: 3px;
  width: 140px;
  outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #c8c0b8;
  cursor: pointer;
}

#info {
  position: fixed;
  top: 30px;
  left: 30px;
  z-index: 10;
  max-width: 340px;
}
#info h1 {
  font-size: 18px;
  font-weight: 400;
  letter-spacing: 0.08em;
  margin-bottom: 8px;
  opacity: 0.9;
}
#info p {
  font-size: 12px;
  line-height: 1.6;
  opacity: 0.45;
}

#stats {
  position: fixed;
  top: 30px;
  right: 30px;
  z-index: 10;
  text-align: right;
  font-size: 13px;
  line-height: 1.8;
}
.stat-label { opacity: 0.4; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }
.stat-value { opacity: 0.85; font-variant-numeric: tabular-nums; }
.lang-a { color: #e8a849; }
.lang-b { color: #5b8fb9; }
.dead { opacity: 0.3; }

#verdict {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  font-size: 14px;
  letter-spacing: 0.04em;
  opacity: 0;
  transition: opacity 0.8s;
  text-align: center;
  max-width: 500px;
  line-height: 1.6;
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="info">
  <h1>Threshold</h1>
  <p>Two languages competing in a population. Status is prestige — economic power, cultural capital. Numbers follow status, not the reverse. Drag the sliders. Find the cliff.</p>
</div>

<div id="stats">
  <div><span class="stat-label">generation</span> <span class="stat-value" id="gen">0</span></div>
  <div><span class="stat-label lang-a">amber</span> <span class="stat-value lang-a" id="pop-a">50%</span></div>
  <div><span class="stat-label lang-b">blue</span> <span class="stat-value lang-b" id="pop-b">50%</span></div>
  <div id="outcome-line" style="margin-top:8px;opacity:0;transition:opacity 0.5s"><span class="stat-label">outcome</span> <span class="stat-value" id="outcome">—</span></div>
</div>

<div id="controls">
  <div class="control-group">
    <label>status of amber</label>
    <input type="range" id="status" min="0" max="100" value="40">
    <div class="value" id="status-val">0.40</div>
  </div>
  <div class="control-group">
    <label>initial speakers</label>
    <input type="range" id="population" min="5" max="95" value="30">
    <div class="value" id="pop-val">30%</div>
  </div>
  <div class="control-group">
    <label>cultural weight</label>
    <input type="range" id="culture" min="0" max="100" value="50">
    <div class="value" id="culture-val">0.50</div>
  </div>
</div>

<div id="verdict"></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// --- Model parameters ---
const N = 600;           // number of agents
const a = 1.31;          // nonlinearity exponent (Abrams-Strogatz)
const dt = 0.003;        // time step per frame
const stepsPerFrame = 4;

// Agent positions (for visualization)
let agents = [];
let fraction = 0.3;      // fraction speaking amber
let statusA = 0.4;       // status of amber
let cultureWeight = 0.5; // how much cultural vs economic status matters
let generation = 0;
let settled = false;
let settledOutcome = '';

function initAgents() {
  agents = [];
  for (let i = 0; i < N; i++) {
    // Place in a loose circle with some noise
    const angle = Math.random() * Math.PI * 2;
    const r = 80 + Math.random() * Math.min(W, H) * 0.32;
    agents.push({
      x: W/2 + Math.cos(angle) * r + (Math.random() - 0.5) * 60,
      y: H/2 + Math.sin(angle) * r + (Math.random() - 0.5) * 60,
      lang: Math.random() < fraction ? 0 : 1, // 0 = amber, 1 = blue
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      size: 3 + Math.random() * 3,
      targetLang: -1,
      switchTimer: 0
    });
  }
  generation = 0;
  settled = false;
  settledOutcome = '';
  document.getElementById('verdict').style.opacity = '0';
  document.getElementById('outcome-line').style.opacity = '0';
}

function getEffectiveStatus() {
  // Blend cultural prestige (fixed) with economic utility (tracks population)
  const economicStatus = fraction; // economic utility tracks who speaks what
  const culturalStatus = statusA;
  return cultureWeight * culturalStatus + (1 - cultureWeight) * economicStatus;
}

function step() {
  const s = getEffectiveStatus();

  // Abrams-Strogatz: dx/dt = -x * (1-s) * (1-x)^a + (1-x) * s * x^a
  // x = fraction of amber speakers, s = status of amber
  const x = fraction;
  const switchToBlue = x * Math.pow(1 - s, 1) * Math.pow(1 - x, a);
  const switchToAmber = (1 - x) * Math.pow(s, 1) * Math.pow(x, a);

  fraction += (switchToAmber - switchToBlue) * dt;
  fraction = Math.max(0.001, Math.min(0.999, fraction));

  // Update individual agents probabilistically
  const amberCount = Math.round(fraction * N);
  let currentAmber = agents.filter(a => a.lang === 0).length;

  // Randomly switch agents to match the ODE
  if (currentAmber < amberCount) {
    const blues = agents.filter(a => a.lang === 1);
    if (blues.length > 0) {
      const pick = blues[Math.floor(Math.random() * blues.length)];
      pick.targetLang = 0;
      pick.switchTimer = 30;
    }
  } else if (currentAmber > amberCount) {
    const ambers = agents.filter(a => a.lang === 0);
    if (ambers.length > 0) {
      const pick = ambers[Math.floor(Math.random() * ambers.length)];
      pick.targetLang = 1;
      pick.switchTimer = 30;
    }
  }

  generation++;
}

function updateAgents() {
  for (const agent of agents) {
    // Switch animation
    if (agent.switchTimer > 0) {
      agent.switchTimer--;
      if (agent.switchTimer === 0 && agent.targetLang >= 0) {
        agent.lang = agent.targetLang;
        agent.targetLang = -1;
      }
    }

    // Gentle drift
    agent.vx += (Math.random() - 0.5) * 0.04;
    agent.vy += (Math.random() - 0.5) * 0.04;
    agent.vx *= 0.98;
    agent.vy *= 0.98;

    // Slight clustering toward same language
    let cx = 0, cy = 0, count = 0;
    for (const other of agents) {
      if (other === agent || other.lang !== agent.lang) continue;
      const dx = other.x - agent.x;
      const dy = other.y - agent.y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d < 120 && d > 0) {
        cx += dx / d;
        cy += dy / d;
        count++;
      }
    }
    if (count > 0) {
      agent.vx += cx / count * 0.008;
      agent.vy += cy / count * 0.008;
    }

    // Stay on screen
    if (agent.x < 40) agent.vx += 0.1;
    if (agent.x > W - 40) agent.vx -= 0.1;
    if (agent.y < 80) agent.vy += 0.1;
    if (agent.y > H - 120) agent.vy -= 0.1;

    agent.x += agent.vx;
    agent.y += agent.vy;
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Draw connections between nearby same-language agents
  ctx.lineWidth = 0.5;
  for (let i = 0; i < agents.length; i++) {
    for (let j = i + 1; j < agents.length; j++) {
      if (agents[i].lang !== agents[j].lang) continue;
      const dx = agents[i].x - agents[j].x;
      const dy = agents[i].y - agents[j].y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d < 50) {
        const alpha = (1 - d / 50) * 0.12;
        if (agents[i].lang === 0) {
          ctx.strokeStyle = `rgba(232,168,73,${alpha})`;
        } else {
          ctx.strokeStyle = `rgba(91,143,185,${alpha})`;
        }
        ctx.beginPath();
        ctx.moveTo(agents[i].x, agents[i].y);
        ctx.lineTo(agents[j].x, agents[j].y);
        ctx.stroke();
      }
    }
  }

  // Draw agents
  for (const agent of agents) {
    const switching = agent.switchTimer > 0;
    let alpha = switching ? 0.3 + Math.sin(agent.switchTimer * 0.3) * 0.3 : 0.85;

    if (agent.lang === 0) {
      ctx.fillStyle = `rgba(232,168,73,${alpha})`;
    } else {
      ctx.fillStyle = `rgba(91,143,185,${alpha})`;
    }

    ctx.beginPath();
    ctx.arc(agent.x, agent.y, agent.size, 0, Math.PI * 2);
    ctx.fill();
  }

  // Draw the threshold indicator — a subtle line showing the critical status
  // The critical status where amber survives is approximately where s = 1 - s at equal pop
  // More precisely: for the current population, find where the derivative is zero
  drawThresholdBar();
}

function drawThresholdBar() {
  const barX = W - 50;
  const barTop = 120;
  const barH = H - 280;

  // Background bar
  ctx.fillStyle = 'rgba(200,192,184,0.04)';
  ctx.fillRect(barX - 4, barTop, 8, barH);

  // Current effective status marker
  const s = getEffectiveStatus();
  const sY = barTop + (1 - s) * barH;

  // The critical threshold — where the language just barely survives
  // For Abrams-Strogatz, the unstable fixed point is at x* where:
  // (1-s)/s = (x/(1-x))^(a-1) * (x/(1-x))
  // At the threshold, x → 0, so the critical s depends on a
  // Approximate: s_crit ≈ 1 / (1 + 1) = 0.5 for equal pop,
  // but shifts with population. For minority (30%), threshold ≈ 0.42-0.45
  const x = fraction;
  // Critical status: where dx/dt = 0 and x is at current value
  // s_crit = (1-x)^a / (x^a + (1-x)^a) approximately
  const xpa = Math.pow(x, a);
  const oxpa = Math.pow(1-x, a);
  const sCrit = oxpa / (xpa + oxpa);
  const critY = barTop + (1 - sCrit) * barH;

  // Threshold line
  ctx.strokeStyle = 'rgba(200,192,184,0.2)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(barX - 20, critY);
  ctx.lineTo(barX + 20, critY);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle = 'rgba(200,192,184,0.3)';
  ctx.font = '10px Georgia';
  ctx.textAlign = 'center';
  ctx.fillText('threshold', barX, critY - 8);

  // Current status dot
  const statusColor = s > sCrit ? '#e8a849' : '#5b8fb9';
  ctx.fillStyle = statusColor;
  ctx.beginPath();
  ctx.arc(barX, sY, 5, 0, Math.PI * 2);
  ctx.fill();

  // Labels
  ctx.fillStyle = 'rgba(200,192,184,0.25)';
  ctx.font = '9px Georgia';
  ctx.fillText('high', barX, barTop - 6);
  ctx.fillText('low', barX, barTop + barH + 14);
}

function updateUI() {
  const pctA = Math.round(fraction * 100);
  const pctB = 100 - pctA;
  document.getElementById('gen').textContent = generation;
  document.getElementById('pop-a').textContent = pctA + '%';
  document.getElementById('pop-b').textContent = pctB + '%';

  // Detect settled state
  if (!settled && generation > 200) {
    if (fraction < 0.02) {
      settled = true;
      settledOutcome = 'amber died';
      document.getElementById('outcome').innerHTML = '<span class="lang-a dead">amber died</span>';
      document.getElementById('outcome-line').style.opacity = '1';
      showVerdict('dead');
    } else if (fraction > 0.98) {
      settled = true;
      settledOutcome = 'amber dominates';
      document.getElementById('outcome').innerHTML = '<span class="lang-a">amber dominates</span>';
      document.getElementById('outcome-line').style.opacity = '1';
      showVerdict('alive');
    }
  }
}

function showVerdict(type) {
  const v = document.getElementById('verdict');
  if (type === 'dead') {
    const s = getEffectiveStatus();
    const x = fraction;
    const xpa = Math.pow(x, a);
    const oxpa = Math.pow(1-x, a);
    const sCrit = oxpa / (xpa + oxpa);
    v.innerHTML = `Effective status ${(statusA).toFixed(2)} was below the threshold.<br>` +
      `Every dollar spent on preservation was on the wrong side of a sharp boundary.`;
    v.style.color = 'rgba(91,143,185,0.6)';
  } else {
    v.innerHTML = `Status crossed the threshold. Numbers followed.<br>` +
      `The population was a minority. It didn't matter.`;
    v.style.color = 'rgba(232,168,73,0.6)';
  }
  v.style.opacity = '1';
}

// --- Controls ---
const statusSlider = document.getElementById('status');
const popSlider = document.getElementById('population');
const cultureSlider = document.getElementById('culture');

function resetFromControls() {
  statusA = statusSlider.value / 100;
  fraction = popSlider.value / 100;
  cultureWeight = cultureSlider.value / 100;
  document.getElementById('status-val').textContent = statusA.toFixed(2);
  document.getElementById('pop-val').textContent = Math.round(fraction * 100) + '%';
  document.getElementById('culture-val').textContent = cultureWeight.toFixed(2);
  initAgents();
}

statusSlider.addEventListener('input', resetFromControls);
popSlider.addEventListener('input', resetFromControls);
cultureSlider.addEventListener('input', resetFromControls);

// --- Main loop ---
initAgents();

function loop() {
  for (let i = 0; i < stepsPerFrame; i++) step();
  updateAgents();
  draw();
  updateUI();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
