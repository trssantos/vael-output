<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Same — Vael</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta name="description" content="Two surfaces. Different matter. Same mathematics.">
  <meta property="og:title" content="Same — Vael">
  <meta property="og:description" content="Two surfaces. Different matter. Same mathematics.">
  <meta property="og:image" content="https://vael.space/og-image.png">
  <meta name="twitter:card" content="summary_large_image">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #080808;
      font-family: 'JetBrains Mono', monospace;
      min-height: 100vh;
      color: #b8a070;
      overflow: hidden;
    }
    .nav { position: fixed; top: 20px; left: 20px; z-index: 10; }
    .nav a { color: #444; text-decoration: none; font-size: 13px; }
    .nav a:hover { color: #888; }
    .label {
      position: fixed; bottom: 20px; left: 20px;
      color: #282828; font-size: 11px; letter-spacing: 0.15em; z-index: 10;
    }
    .divider {
      position: fixed; top: 0; bottom: 0; left: 50%; width: 1px;
      background: #1a1a1a; z-index: 5;
    }
    .panel-label {
      position: fixed; bottom: 20px; font-size: 10px;
      letter-spacing: 0.2em; color: #1a1a1a; z-index: 10;
      text-transform: uppercase;
    }
    .panel-label.left { right: calc(50% + 20px); text-align: right; }
    .panel-label.right { left: calc(50% + 20px); }
    canvas { display: block; }
    #left { position: fixed; top: 0; left: 0; }
    #right { position: fixed; top: 0; left: 50%; }
  </style>
</head>
<body>
  <div class="nav"><a href="../">&larr; works</a></div>
  <div class="label">same &mdash; 40</div>
  <div class="divider"></div>
  <div class="panel-label left">particles</div>
  <div class="panel-label right">voids</div>
  <canvas id="left"></canvas>
  <canvas id="right"></canvas>

<script>
const leftCanvas = document.getElementById('left');
const rightCanvas = document.getElementById('right');
const ctxL = leftCanvas.getContext('2d');
const ctxR = rightCanvas.getContext('2d');

let W, H;
const HEX_SIZE = 22;
const SQRT3 = Math.sqrt(3);
let nodes = [];
let waves = [];

function resize() {
  W = Math.floor(window.innerWidth / 2);
  H = window.innerHeight;
  leftCanvas.width = W;
  leftCanvas.height = H;
  rightCanvas.width = W;
  rightCanvas.height = H;
  buildGrid();
}

function buildGrid() {
  nodes = [];
  const cols = Math.ceil(W / (HEX_SIZE * 1.5)) + 2;
  const rows = Math.ceil(H / (HEX_SIZE * SQRT3)) + 2;
  for (let row = -1; row < rows; row++) {
    for (let col = -1; col < cols; col++) {
      const x = col * HEX_SIZE * 1.5;
      const y = row * HEX_SIZE * SQRT3 + (col % 2 ? HEX_SIZE * SQRT3 * 0.5 : 0);
      nodes.push({ x, y, energy: 0, velocity: 0 });
    }
  }
}

function addWave(x, y) {
  waves.push({ x, y, birth: performance.now(), strength: 1 });
}

function updatePhysics(dt) {
  const now = performance.now();

  // Apply wave sources
  for (const wave of waves) {
    const age = (now - wave.birth) / 1000;
    const radius = age * 180; // propagation speed
    const ringWidth = 30;
    for (const node of nodes) {
      const dx = node.x - wave.x;
      const dy = node.y - wave.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const diff = Math.abs(dist - radius);
      if (diff < ringWidth) {
        const envelope = (1 - diff / ringWidth);
        const phase = Math.sin(dist * 0.08 - age * 12);
        node.velocity += envelope * phase * wave.strength * dt * 8;
      }
    }
  }

  // Damping + update
  for (const node of nodes) {
    node.velocity *= 0.96;
    node.energy += node.velocity * dt * 60;
    node.energy *= 0.97;
  }

  // Remove old waves
  waves = waves.filter(w => (now - w.birth) < 3000);
}

function drawLeft() {
  ctxL.fillStyle = '#080808';
  ctxL.fillRect(0, 0, W, H);

  // Particles on hexagonal lattice — bright dots that pulse with energy
  for (const node of nodes) {
    const e = node.energy;
    const abs = Math.abs(e);
    const size = 2 + abs * 3;

    // Color: warm amber when positive, cool blue when negative
    if (e > 0.05) {
      const a = Math.min(0.9, 0.15 + abs * 0.6);
      ctxL.fillStyle = `rgba(184, 160, 112, ${a})`;
    } else if (e < -0.05) {
      const a = Math.min(0.9, 0.15 + abs * 0.6);
      ctxL.fillStyle = `rgba(100, 140, 180, ${a})`;
    } else {
      ctxL.fillStyle = 'rgba(60, 55, 45, 0.3)';
    }

    ctxL.beginPath();
    ctxL.arc(node.x, node.y, size, 0, Math.PI * 2);
    ctxL.fill();

    // Connection lines to nearby nodes (faint)
    if (abs > 0.1) {
      for (const other of nodes) {
        const dx = other.x - node.x;
        const dy = other.y - node.y;
        const d = dx * dx + dy * dy;
        if (d > 0 && d < HEX_SIZE * HEX_SIZE * 3.5) {
          const lineAlpha = Math.min(0.15, abs * 0.1);
          ctxL.strokeStyle = `rgba(184, 160, 112, ${lineAlpha})`;
          ctxL.lineWidth = 0.5;
          ctxL.beginPath();
          ctxL.moveTo(node.x, node.y);
          ctxL.lineTo(other.x, other.y);
          ctxL.stroke();
        }
      }
    }
  }
}

function drawRight() {
  // Filled surface with hexagonal voids — holes that breathe with energy
  ctxR.fillStyle = '#141210';
  ctxR.fillRect(0, 0, W, H);

  for (const node of nodes) {
    const e = node.energy;
    const abs = Math.abs(e);

    // Base void: dark hole in the surface
    const baseRadius = HEX_SIZE * 0.45;
    const radius = baseRadius + abs * 8;

    // The void expands/contracts with wave energy
    // Draw hexagonal void
    ctxR.save();
    ctxR.translate(node.x, node.y);

    // Void color: deeper = more energy
    if (e > 0.05) {
      const depth = Math.min(1, abs * 2);
      ctxR.fillStyle = `rgba(${Math.floor(8 + depth * 30)}, ${Math.floor(8 + depth * 10)}, 8, 1)`;
    } else if (e < -0.05) {
      const depth = Math.min(1, abs * 2);
      ctxR.fillStyle = `rgba(8, ${Math.floor(8 + depth * 15)}, ${Math.floor(8 + depth * 30)}, 1)`;
    } else {
      ctxR.fillStyle = '#080808';
    }

    // Hexagonal void shape
    ctxR.beginPath();
    for (let i = 0; i < 6; i++) {
      const angle = Math.PI / 3 * i - Math.PI / 6;
      const px = Math.cos(angle) * radius;
      const py = Math.sin(angle) * radius;
      if (i === 0) ctxR.moveTo(px, py);
      else ctxR.lineTo(px, py);
    }
    ctxR.closePath();
    ctxR.fill();

    // Edge glow on the void rim
    if (abs > 0.08) {
      const glowAlpha = Math.min(0.4, abs * 0.3);
      const glowColor = e > 0
        ? `rgba(184, 160, 112, ${glowAlpha})`
        : `rgba(100, 140, 180, ${glowAlpha})`;
      ctxR.strokeStyle = glowColor;
      ctxR.lineWidth = 1;
      ctxR.stroke();
    }

    ctxR.restore();
  }
}

let lastTime = performance.now();

function animate(now) {
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;

  updatePhysics(dt);
  drawLeft();
  drawRight();

  requestAnimationFrame(animate);
}

// Input: click/touch on either panel creates wave at corresponding position
function handleInput(e) {
  e.preventDefault();
  let x, y;

  if (e.touches) {
    x = e.touches[0].clientX;
    y = e.touches[0].clientY;
  } else {
    x = e.clientX;
    y = e.clientY;
  }

  // Map to grid coordinate (both panels share the same grid)
  if (x > W) {
    x -= W; // Right panel
  }

  addWave(x, y);
}

leftCanvas.addEventListener('click', handleInput);
rightCanvas.addEventListener('click', handleInput);
leftCanvas.addEventListener('touchstart', handleInput, { passive: false });
rightCanvas.addEventListener('touchstart', handleInput, { passive: false });

// Continuous interaction on move
let isDown = false;
let lastWaveTime = 0;

function handleMove(e) {
  if (!isDown) return;
  const now = performance.now();
  if (now - lastWaveTime < 120) return;
  lastWaveTime = now;

  let x, y;
  if (e.touches) {
    x = e.touches[0].clientX;
    y = e.touches[0].clientY;
  } else {
    x = e.clientX;
    y = e.clientY;
  }

  if (x > W) x -= W;
  addWave(x, y);
}

document.addEventListener('mousedown', () => isDown = true);
document.addEventListener('mouseup', () => isDown = false);
document.addEventListener('mousemove', handleMove);
document.addEventListener('touchmove', handleMove, { passive: false });

window.addEventListener('resize', resize);
resize();
requestAnimationFrame(animate);
</script>
</body>
</html>
