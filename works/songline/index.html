<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Songline — Vael</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta name="description" content="The path is the knowledge. Walk to remember.">
  <meta property="og:title" content="Songline — Vael">
  <meta property="og:description" content="The path is the knowledge. Walk to remember.">
  <meta property="og:image" content="https://vael.space/og-image.png">
  <meta name="twitter:card" content="summary_large_image">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      background: #080808;
      font-family: 'JetBrains Mono', monospace;
      color: #b8a070;
      cursor: none;
      touch-action: none;
    }
    .nav { position: fixed; top: 20px; left: 20px; z-index: 10; }
    .nav a { color: #444; text-decoration: none; font-size: 13px; cursor: pointer; }
    .nav a:hover { color: #888; }
    .label {
      position: fixed; bottom: 20px; left: 20px;
      color: #282828; font-size: 11px; letter-spacing: 0.15em; z-index: 10;
    }
    .hint {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      color: #333; font-size: 13px; z-index: 10;
      transition: opacity 3s;
      pointer-events: none;
    }
    #songline {
      position: fixed; bottom: 48px; left: 50%; transform: translateX(-50%);
      color: #b8a070; font-size: 13px; letter-spacing: 0.06em;
      max-width: 85vw; text-align: center;
      z-index: 10; opacity: 0;
      font-weight: 300;
      transition: opacity 1s;
      line-height: 1.8;
    }
    #count {
      position: fixed; bottom: 20px; right: 20px;
      color: #222; font-size: 11px; z-index: 10;
    }
    canvas { display: block; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div class="nav"><a href="../">&larr; works</a></div>
  <div class="label">songline — 43</div>
  <div class="hint">move to walk</div>
  <div id="songline"></div>
  <div id="count"></div>
  <canvas id="c"></canvas>
  <script>
  (() => {
    const c = document.getElementById('c');
    const ctx = c.getContext('2d');
    const songlineEl = document.getElementById('songline');
    const hintEl = document.querySelector('.hint');
    const countEl = document.getElementById('count');
    let W, H;

    // Seeded RNG for consistent landscape
    function makeRng(seed) {
      return function() {
        seed |= 0; seed = seed + 0x6D2B79F5 | 0;
        let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }
    const rand = makeRng(7919);

    // Words — each site holds one. Your path determines the order.
    const words = [
      'the', 'land', 'holds', 'what', 'was',
      'sung', 'walking', 'is', 'knowing', 'same',
      'ground', 'different', 'song', 'you', 'crossed',
      'before', 'here', 'only', 'remains', 'path'
    ];
    const N = words.length;

    // Place sites with blue-noise distribution
    const sites = [];
    const margin = 0.12;
    for (let i = 0; i < N; i++) {
      let best = null, bestDist = 0;
      for (let a = 0; a < 60; a++) {
        const x = margin + rand() * (1 - 2 * margin);
        const y = margin + rand() * (1 - 2 * margin);
        let nearest = Infinity;
        for (const s of sites) {
          nearest = Math.min(nearest, Math.hypot(x - s.nx, y - s.ny));
        }
        if (sites.length === 0) nearest = 1;
        if (nearest > bestDist) {
          bestDist = nearest;
          best = { nx: x, ny: y };
        }
      }
      sites.push({
        nx: best.nx, ny: best.ny,
        word: words[i],
        found: false,
        alpha: 0,
        pulseTime: 0
      });
    }

    // Trail state
    const trail = [];
    let moved = false;
    let cursorX = -100, cursorY = -100;
    const collected = [];
    let allFound = false;
    let allFoundTime = 0;

    function onMove(x, y) {
      if (!moved) {
        moved = true;
        hintEl.style.opacity = '0';
      }
      cursorX = x;
      cursorY = y;

      const last = trail[trail.length - 1];
      if (!last || Math.hypot(x - last.x, y - last.y) > 2) {
        trail.push({ x, y, t: performance.now() });
      }

      // Clean old trail
      const now = performance.now();
      while (trail.length > 0 && (now - trail[0].t) > 45000) {
        trail.shift();
      }

      // Check sites
      if (!allFound) {
        for (const s of sites) {
          if (s.found) continue;
          const sx = s.nx * W, sy = s.ny * H;
          if (Math.hypot(x - sx, y - sy) < 42) {
            s.found = true;
            s.pulseTime = now;
            collected.push(s.word);
            updateSongline();
          }
        }
      }
    }

    addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
    addEventListener('touchmove', e => {
      e.preventDefault();
      onMove(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: false });
    addEventListener('touchstart', e => {
      onMove(e.touches[0].clientX, e.touches[0].clientY);
    });

    function updateSongline() {
      songlineEl.textContent = collected.join('   ');
      songlineEl.style.opacity = '0.7';
      countEl.textContent = collected.length + ' / ' + N;
      if (collected.length === N && !allFound) {
        allFound = true;
        allFoundTime = performance.now();
        countEl.style.color = '#b8a070';
        countEl.style.opacity = '0.3';
      }
    }

    // Pre-render terrain contours
    let terrainCanvas = null;
    function renderTerrain() {
      const scale = 4;
      const tc = document.createElement('canvas');
      const tw = Math.ceil(W / scale);
      const th = Math.ceil(H / scale);
      tc.width = tw;
      tc.height = th;
      const tctx = tc.getContext('2d');
      for (let y = 0; y < th; y++) {
        for (let x = 0; x < tw; x++) {
          const fx = x / tw, fy = y / th;
          const n = Math.sin(fx * 6.5) * Math.cos(fy * 5.1)
                  + Math.sin(fx * 2.7 + fy * 3.4) * 0.55
                  + Math.cos(fx * 9.8 - fy * 6.2) * 0.3
                  + Math.sin(fx * 4.1 * fy * 2.3 + 1.7) * 0.2;
          const frac = Math.abs(n - Math.round(n));
          if (frac < 0.035) {
            const a = 0.06 * (1 - frac / 0.035);
            tctx.fillStyle = `rgba(150, 130, 95, ${a})`;
            tctx.fillRect(x, y, 1, 1);
          }
        }
      }
      terrainCanvas = tc;
    }

    function resize() {
      W = c.width = innerWidth;
      H = c.height = innerHeight;
      renderTerrain();
    }
    resize();
    addEventListener('resize', resize);

    // Main draw loop
    function draw() {
      ctx.clearRect(0, 0, W, H);
      const now = performance.now();

      // Terrain — brightens slightly when all found
      if (terrainCanvas) {
        if (allFound) {
          const t = Math.min(1, (now - allFoundTime) / 5000);
          ctx.globalAlpha = 1 + t * 1.5;
        }
        ctx.drawImage(terrainCanvas, 0, 0, W, H);
        ctx.globalAlpha = 1;
      }

      // Trail — batched by groups of 20 for performance
      if (trail.length > 1) {
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.lineWidth = 1.2;
        const batch = 20;
        for (let b = 0; b < trail.length - 1; b += batch) {
          const end = Math.min(b + batch, trail.length - 1);
          const midIdx = Math.floor((b + end) / 2);
          const age = (now - trail[midIdx].t) / 1000;
          const fade = Math.max(0, 1 - age / 45);
          if (fade <= 0) continue;
          ctx.strokeStyle = `rgba(184, 160, 112, ${fade * 0.35})`;
          ctx.beginPath();
          ctx.moveTo(trail[b].x, trail[b].y);
          for (let i = b + 1; i <= end; i++) {
            ctx.lineTo(trail[i].x, trail[i].y);
          }
          ctx.stroke();
        }
      }

      // Sites
      for (const s of sites) {
        const sx = s.nx * W, sy = s.ny * H;

        if (!s.found) {
          // Faintest pulse — barely visible hint
          const pulse = 0.5 + 0.5 * Math.sin(now * 0.0007 + s.nx * 23 + s.ny * 17);
          ctx.beginPath();
          ctx.arc(sx, sy, 2, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(184, 160, 112, ${0.035 + 0.025 * pulse})`;
          ctx.fill();
        } else {
          const age = (now - s.pulseTime) / 1000;
          s.alpha = Math.min(1, age / 1.2);

          // Discovery ring
          if (age < 2.5) {
            const t = age / 2.5;
            ctx.beginPath();
            ctx.arc(sx, sy, 4 + t * 55, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(184, 160, 112, ${0.2 * (1 - t)})`;
            ctx.lineWidth = 0.7;
            ctx.stroke();
          }

          // Anchor dot
          ctx.beginPath();
          ctx.arc(sx, sy, 2.5, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(184, 160, 112, ${s.alpha * 0.45})`;
          ctx.fill();

          // Word
          ctx.font = '300 13px "JetBrains Mono", monospace';
          ctx.textAlign = 'center';
          ctx.fillStyle = `rgba(184, 160, 112, ${s.alpha * 0.7})`;
          ctx.fillText(s.word, sx, sy - 14);
        }
      }

      // Cursor
      if (moved) {
        ctx.beginPath();
        ctx.arc(cursorX, cursorY, 3, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(184, 160, 112, 0.5)';
        ctx.fill();
        // Faint detection radius
        ctx.beginPath();
        ctx.arc(cursorX, cursorY, 42, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(184, 160, 112, 0.025)';
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }

      requestAnimationFrame(draw);
    }

    draw();
  })();
  </script>
</body>
</html>
