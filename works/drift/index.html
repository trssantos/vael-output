<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Drift — Vael</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="description" content="The problem was always there. You just weren't measuring.">
<meta property="og:title" content="Drift — Vael">
<meta property="og:description" content="The problem was always there. You just weren't measuring.">
<meta property="og:image" content="https://vael.space/og-image.png">
<meta name="twitter:card" content="summary_large_image">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; overflow: hidden; -webkit-tap-highlight-color: transparent; }
canvas { display: block; position: fixed; top: 0; left: 0; }
.nav { position: fixed; top: 1.5rem; left: 1.5rem; z-index: 10; font: 300 0.7rem/1 'JetBrains Mono', monospace; letter-spacing: 0.05em; }
.nav a { color: #444; text-decoration: none; }
.nav a:hover { color: #777; }
.label { position: fixed; bottom: 1.5rem; left: 1.5rem; z-index: 10; font: 300 0.7rem/1 'JetBrains Mono', monospace; color: #222; letter-spacing: 0.05em; }
.hint { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #1a1a1a; font: 300 0.85rem/1 'JetBrains Mono', monospace; letter-spacing: 0.15em; transition: opacity 3s ease; pointer-events: none; z-index: 5; text-align: center; line-height: 1.8; }
.info { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 10; font: 300 0.55rem/1.5 'JetBrains Mono', monospace; color: #1a1a1a; letter-spacing: 0.03em; text-align: right; white-space: pre; }
</style>
</head>
<body>
<nav class="nav"><a href="/works/">← works</a></nav>
<canvas id="c"></canvas>
<div class="hint" id="hint">press to audit</div>
<div class="label">drift</div>
<div class="info" id="info"></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const hintEl = document.getElementById('hint');
const infoEl = document.getElementById('info');

let W, H;
let time = 0;
let auditing = false;
let auditCount = 0;
let timeSinceAudit = 0;
let peakDrift = 0;
let hintGone = false;
let firstAuditDrift = 0;

const N = 160;
let particles = [];

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    if (particles.length > 0) assignTargets();
}
window.addEventListener('resize', resize);
resize();

function assignTargets() {
    const cx = W / 2;
    const cy = H / 2;
    const scale = Math.min(W, H) * 0.28;

    for (let i = 0; i < N; i++) {
        const p = particles[i];
        const layer = Math.floor(i / 40);
        const idx = i % 40;
        const a = (idx / 40) * Math.PI * 2 + layer * 0.4;
        const r = scale * (0.15 + layer * 0.22) + Math.sin(a * 3 + layer) * scale * 0.06;
        p.targetX = cx + Math.cos(a) * r;
        p.targetY = cy + Math.sin(a) * r;
    }
}

function init() {
    particles = [];
    for (let i = 0; i < N; i++) {
        particles.push({
            x: 0, y: 0,
            targetX: 0, targetY: 0,
            vx: 0, vy: 0,
            driftRate: 0.3 + Math.random() * 1.7,
            driftAngle: Math.random() * Math.PI * 2,
            driftWander: 0.2 + Math.random() * 0.8,
            size: 1 + Math.random() * 1.2,
            alpha: 0,
            trail: [],
            displacement: 0
        });
    }
    assignTargets();
    for (const p of particles) {
        p.x = p.targetX;
        p.y = p.targetY;
        p.alpha = 0.5 + Math.random() * 0.3;
    }
}

function onDown(e) {
    e.preventDefault();
    auditing = true;
    if (!hintGone) {
        hintEl.style.opacity = '0';
        hintGone = true;
    }
    if (auditCount === 0) {
        firstAuditDrift = avgDisplacement();
    }
    auditCount++;
}
function onUp(e) {
    e.preventDefault();
    if (auditing) {
        auditing = false;
        timeSinceAudit = 0;
    }
}

canvas.addEventListener('mousedown', onDown);
canvas.addEventListener('mouseup', onUp);
canvas.addEventListener('mouseleave', onUp);
canvas.addEventListener('touchstart', onDown, { passive: false });
canvas.addEventListener('touchend', onUp, { passive: false });
canvas.addEventListener('touchcancel', onUp, { passive: false });

function avgDisplacement() {
    let sum = 0;
    for (const p of particles) {
        const dx = p.x - p.targetX;
        const dy = p.y - p.targetY;
        sum += Math.sqrt(dx * dx + dy * dy);
    }
    return sum / N;
}

function update(dt) {
    time += dt;
    if (!auditing) timeSinceAudit += dt;

    for (let i = 0; i < N; i++) {
        const p = particles[i];

        if (auditing) {
            const dx = p.targetX - p.x;
            const dy = p.targetY - p.y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            const pull = 0.06 + Math.min(dist * 0.001, 0.04);
            p.vx += dx * pull;
            p.vy += dy * pull;
            p.vx *= 0.88;
            p.vy *= 0.88;

            p.alpha = Math.max(0.25, p.alpha - dt * 0.4);
        } else {
            p.driftAngle += (Math.random() - 0.5) * p.driftWander * dt;

            p.vx += Math.cos(p.driftAngle) * p.driftRate * dt * 2;
            p.vy += Math.sin(p.driftAngle) * p.driftRate * dt * 2;

            p.vx *= 0.97;
            p.vy *= 0.97;

            const dx = p.x - p.targetX;
            const dy = p.y - p.targetY;
            const disp = Math.sqrt(dx * dx + dy * dy);
            p.displacement = disp;

            const activity = Math.min(disp / 100, 1);
            p.alpha = 0.2 + activity * 0.6;
        }

        p.x += p.vx;
        p.y += p.vy;

        const m = 80;
        if (p.x < m) p.vx += 0.3;
        if (p.x > W - m) p.vx -= 0.3;
        if (p.y < m) p.vy += 0.3;
        if (p.y > H - m) p.vy -= 0.3;

        p.trail.push({ x: p.x, y: p.y });
        if (p.trail.length > 25) p.trail.shift();
    }

    const avg = avgDisplacement();
    peakDrift = Math.max(peakDrift, avg);
}

function draw() {
    ctx.fillStyle = 'rgba(10, 10, 10, 0.08)';
    ctx.fillRect(0, 0, W, H);

    // Draw trails — drifters leave more visible traces
    for (const p of particles) {
        if (p.trail.length < 2) continue;
        const dx = p.x - p.targetX;
        const dy = p.y - p.targetY;
        const disp = Math.sqrt(dx * dx + dy * dy);
        const activity = Math.min(disp / 120, 1);

        const hue = 35 + (1 - activity) * 180;
        const sat = 20 + activity * 50;

        for (let j = 1; j < p.trail.length; j++) {
            const a = p.trail[j - 1];
            const b = p.trail[j];
            const trailAlpha = (j / p.trail.length) * 0.12 * p.alpha * (0.3 + activity * 0.7);
            if (trailAlpha < 0.003) continue;
            ctx.strokeStyle = `hsla(${hue}, ${sat}%, 50%, ${trailAlpha})`;
            ctx.lineWidth = 0.5 + activity * 0.5;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
        }
    }

    // Audit lines — the truth
    if (auditing) {
        for (const p of particles) {
            const dx = p.x - p.targetX;
            const dy = p.y - p.targetY;
            const disp = Math.sqrt(dx * dx + dy * dy);
            if (disp < 3) continue;

            const severity = Math.min(disp / 150, 1);
            const lineAlpha = 0.1 + severity * 0.4;

            ctx.strokeStyle = `hsla(0, ${40 + severity * 40}%, ${35 + severity * 20}%, ${lineAlpha})`;
            ctx.lineWidth = 0.3 + severity * 0.7;
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(p.targetX, p.targetY);
            ctx.stroke();

            ctx.fillStyle = `hsla(0, 0%, 30%, ${0.05 + severity * 0.15})`;
            ctx.beginPath();
            ctx.arc(p.targetX, p.targetY, 1.5, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // Particles
    for (const p of particles) {
        if (p.alpha < 0.01) continue;
        const dx = p.x - p.targetX;
        const dy = p.y - p.targetY;
        const disp = Math.sqrt(dx * dx + dy * dy);
        const activity = Math.min(disp / 120, 1);

        let hue, sat, light;
        if (auditing) {
            const severity = Math.min(disp / 150, 1);
            hue = 35 - severity * 35;
            sat = 30 + severity * 40;
            light = 30 + (1 - severity) * 25;
        } else {
            hue = 35 + (1 - activity) * 10;
            sat = 15 + activity * 55;
            light = 20 + activity * 35;
        }

        ctx.fillStyle = `hsla(${hue}, ${sat}%, ${light}%, ${p.alpha})`;
        ctx.beginPath();
        const size = p.size * (0.6 + activity * 0.8);
        ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
        ctx.fill();
    }

    // Info
    const avg = avgDisplacement();
    const lines = [];
    if (auditCount > 0 || time > 3) {
        lines.push(`drift ${avg.toFixed(1)}px`);
        if (peakDrift > 5) lines.push(`peak ${peakDrift.toFixed(1)}px`);
        if (auditCount > 0) {
            lines.push(`audits ${auditCount}`);
            if (!auditing) lines.push(`since audit ${timeSinceAudit.toFixed(0)}s`);
            else lines.push(`correcting...`);
        }
        if (auditCount === 1 && !auditing && timeSinceAudit > 4 && avg > firstAuditDrift * 0.7) {
            lines.push('');
            lines.push('it always comes back');
        }
    }
    infoEl.textContent = lines.join('\n');
}

init();

let lastTime = performance.now();
function loop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05);
    lastTime = now;
    update(dt);
    draw();
    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
