<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sift — Vael</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="description" content="8,000 pounds of dirt. Three teeth. The ratio between what you search and what you find.">
<meta property="og:title" content="Sift — Vael">
<meta property="og:description" content="8,000 pounds of dirt. Three teeth. The ratio between what you search and what you find.">
<meta property="og:image" content="https://vael.space/og-image.png">
<meta name="twitter:card" content="summary_large_image">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; overflow: hidden; cursor: default; -webkit-tap-highlight-color: transparent; }
canvas { display: block; position: fixed; top: 0; left: 0; }
.nav { position: fixed; top: 1.5rem; left: 1.5rem; z-index: 10; font: 300 0.7rem/1 'JetBrains Mono', monospace; letter-spacing: 0.05em; }
.nav a { color: #444; text-decoration: none; }
.nav a:hover { color: #777; }
.label { position: fixed; bottom: 1.5rem; left: 1.5rem; z-index: 10; font: 300 0.7rem/1 'JetBrains Mono', monospace; color: #222; letter-spacing: 0.05em; }
.hint { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #1a1a1a; font: 300 0.85rem/1 'JetBrains Mono', monospace; letter-spacing: 0.15em; transition: opacity 4s ease; pointer-events: none; z-index: 5; text-align: center; line-height: 1.8; }
.stats { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 10; font: 300 0.65rem/1 'JetBrains Mono', monospace; color: #1a1a1a; letter-spacing: 0.05em; text-align: right; line-height: 1.6; }
</style>
</head>
<body>
<nav class="nav"><a href="/works/">← works</a></nav>
<canvas id="c"></canvas>
<div class="hint" id="hint">watch</div>
<div class="label">sift</div>
<div class="stats" id="stats"></div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const stats = document.getElementById('stats');
const hint = document.getElementById('hint');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Fade hint
setTimeout(() => { hint.style.opacity = '0'; }, 3000);
setTimeout(() => { hint.style.display = 'none'; }, 7000);

// Particles
const grains = [];
const finds = [];
const settled = [];
const MAX_GRAINS = 600;
const MAX_SETTLED = 2000;
let totalSifted = 0;
let totalFound = 0;
let startTime = Date.now();

// The ratio: ~1 in 1200 grains is a find (scaled from 8000 lbs / 3 teeth,
// but adjusted for visual pacing — real ratio would be too slow)
const FIND_CHANCE = 1 / 1200;

class Grain {
  constructor() {
    this.x = Math.random() * W;
    this.y = -Math.random() * 40;
    this.size = 0.5 + Math.random() * 1.5;
    this.speed = 0.3 + Math.random() * 0.7;
    this.drift = (Math.random() - 0.5) * 0.15;
    this.opacity = 0.03 + Math.random() * 0.06;
    this.isFind = Math.random() < FIND_CHANCE;
    if (this.isFind) {
      this.size = 1.5 + Math.random() * 1;
      this.glowPhase = Math.random() * Math.PI * 2;
      this.found = false;
      this.foundTime = 0;
    }
  }

  update() {
    this.y += this.speed;
    this.x += this.drift;
    // Slight lateral wandering
    this.drift += (Math.random() - 0.5) * 0.02;
    this.drift *= 0.99;

    if (this.isFind && !this.found) {
      this.glowPhase += 0.03;
    }

    // Settle at bottom
    const groundLevel = H - 60 - Math.random() * 30;
    if (this.y > groundLevel) {
      if (this.isFind && !this.found) {
        this.found = true;
        this.foundTime = Date.now();
        totalFound++;
        finds.push({
          x: this.x,
          y: this.y,
          size: this.size,
          time: Date.now(),
          opacity: 1
        });
      }
      // Add to settled layer
      if (settled.length < MAX_SETTLED) {
        settled.push({
          x: this.x,
          y: groundLevel + Math.random() * 20,
          size: this.size * 0.8,
          opacity: this.opacity * 0.5
        });
      }
      return false; // Remove from active
    }
    return true;
  }

  draw() {
    if (this.isFind && !this.found) {
      // Subtle warm glow — barely visible until you notice it
      const glow = 0.15 + 0.1 * Math.sin(this.glowPhase);
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size + 2, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(180, 140, 80, ${glow * 0.15})`;
      ctx.fill();

      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200, 170, 100, ${glow})`;
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(100, 90, 75, ${this.opacity})`;
      ctx.fill();
    }
  }
}

function drawSettled() {
  for (let i = 0; i < settled.length; i++) {
    const s = settled[i];
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(60, 55, 45, ${s.opacity})`;
    ctx.fill();
  }
}

function drawFinds() {
  const now = Date.now();
  for (let i = finds.length - 1; i >= 0; i--) {
    const f = finds[i];
    const age = (now - f.time) / 1000;

    // Bright moment on discovery, then slow fade to warm persistent glow
    const flashBright = Math.max(0, 1 - age * 0.5);
    const persistGlow = 0.4;
    const brightness = Math.max(persistGlow, flashBright);

    // Expanding ring on discovery
    if (age < 3) {
      const ringRadius = f.size + age * 15;
      const ringOpacity = Math.max(0, 0.3 - age * 0.1);
      ctx.beginPath();
      ctx.arc(f.x, f.y, ringRadius, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(200, 170, 100, ${ringOpacity})`;
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }

    // The find itself — warm amber dot
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(210, 175, 100, ${brightness})`;
    ctx.fill();

    // Soft glow around it
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.size + 4, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(180, 140, 70, ${brightness * 0.15})`;
    ctx.fill();
  }
}

function spawnGrains() {
  // Steady rain of particles — about 10 per frame
  const count = 8 + Math.floor(Math.random() * 5);
  for (let i = 0; i < count; i++) {
    if (grains.length < MAX_GRAINS) {
      grains.push(new Grain());
      totalSifted++;
    }
  }
}

function updateStats() {
  const elapsed = (Date.now() - startTime) / 1000;
  const ratio = totalFound > 0 ? Math.floor(totalSifted / totalFound) : '—';
  const perSec = Math.floor(totalSifted / Math.max(1, elapsed));

  stats.innerHTML =
    `sifted: ${totalSifted.toLocaleString()}<br>` +
    `found: ${totalFound}<br>` +
    `ratio: 1 in ${ratio}`;
}

function animate() {
  // Don't clear — let settled layer build naturally
  // But do a very slight fade to prevent over-accumulation
  ctx.fillStyle = 'rgba(10, 10, 10, 0.08)';
  ctx.fillRect(0, 0, W, H);

  spawnGrains();

  // Update and filter
  for (let i = grains.length - 1; i >= 0; i--) {
    if (!grains[i].update()) {
      grains.splice(i, 1);
    }
  }

  // Draw layers
  drawSettled();
  for (const g of grains) g.draw();
  drawFinds();

  // Update stats every 30 frames
  if (totalSifted % 30 === 0) updateStats();

  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
