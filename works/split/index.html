<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Split — Vael</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="description" content="Two voices from one throat.">
<meta property="og:title" content="Split — Vael">
<meta property="og:description" content="Two voices from one throat.">
<meta property="og:image" content="https://vael.space/og-image.png">
<meta name="twitter:card" content="summary_large_image">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; overflow: hidden; cursor: crosshair; -webkit-tap-highlight-color: transparent; }
canvas { display: block; position: fixed; top: 0; left: 0; }
.nav { position: fixed; top: 1.5rem; left: 1.5rem; z-index: 10; font: 300 0.7rem/1 'JetBrains Mono', monospace; letter-spacing: 0.05em; }
.nav a { color: #444; text-decoration: none; }
.nav a:hover { color: #777; }
.label { position: fixed; bottom: 1.5rem; left: 1.5rem; z-index: 10; font: 300 0.7rem/1 'JetBrains Mono', monospace; color: #222; letter-spacing: 0.05em; }
.hint { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #1a1a1a; font: 300 0.85rem/1 'JetBrains Mono', monospace; letter-spacing: 0.15em; transition: opacity 3s ease; pointer-events: none; z-index: 5; text-align: center; line-height: 1.8; }
.info { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 10; font: 300 0.55rem/1.5 'JetBrains Mono', monospace; color: #1a1a1a; letter-spacing: 0.03em; text-align: right; }
</style>
</head>
<body>
<nav class="nav"><a href="/works/">← works</a></nav>
<canvas id="c"></canvas>
<div class="hint" id="hint">click and drag vertically<br>one source — two voices</div>
<div class="label">split</div>
<div class="info" id="info"></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const hintEl = document.getElementById('hint');
const infoEl = document.getElementById('info');

let W, H;
let audioCtx = null;
let started = false;
let dragging = false;

// Audio nodes
let oscLow = null, oscHigh = null;
let gainLow = null, gainHigh = null;
let filterLow = null, filterHigh = null;

// State
let splitAmount = 0;       // 0 = unified, 1 = fully split
let targetSplit = 0;
let baseFreq = 180;        // fundamental — horse whinny range
let mouseX = 0.5, mouseY = 0.5;
let originX = 0, originY = 0;

// Animation state
let time = 0;
let particles = [];
const MAX_PARTICLES = 200;

// Waveform history
const waveHistory = [];
const WAVE_LEN = 256;

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
  originX = W / 2;
  originY = H / 2;
}

function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // Low voice — the "singing" vibration (direct membrane oscillation)
  oscLow = audioCtx.createOscillator();
  gainLow = audioCtx.createGain();
  filterLow = audioCtx.createBiquadFilter();
  oscLow.type = 'sawtooth';
  oscLow.frequency.value = baseFreq;
  filterLow.type = 'lowpass';
  filterLow.frequency.value = 800;
  filterLow.Q.value = 2;
  gainLow.gain.value = 0;
  oscLow.connect(filterLow);
  filterLow.connect(gainLow);
  gainLow.connect(audioCtx.destination);
  oscLow.start();

  // High voice — the "whistling" resonance (cavity resonance)
  oscHigh = audioCtx.createOscillator();
  gainHigh = audioCtx.createGain();
  filterHigh = audioCtx.createBiquadFilter();
  oscHigh.type = 'sine';
  oscHigh.frequency.value = baseFreq * 3;
  filterHigh.type = 'bandpass';
  filterHigh.frequency.value = baseFreq * 3;
  filterHigh.Q.value = 8;
  gainHigh.gain.value = 0;
  oscHigh.connect(filterHigh);
  filterHigh.connect(gainHigh);
  gainHigh.connect(audioCtx.destination);
  oscHigh.start();
}

function updateAudio() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;

  // Base frequency from horizontal mouse position
  baseFreq = 100 + mouseX * 260; // 100-360 Hz range

  // Low voice: always near the fundamental, gets rougher with split
  const lowFreq = baseFreq;
  oscLow.frequency.linearRampToValueAtTime(lowFreq, t + 0.05);
  filterLow.frequency.linearRampToValueAtTime(400 + splitAmount * 600, t + 0.05);

  // High voice: separates upward with split
  // At split=0, same as fundamental. At split=1, ~3x the fundamental (like a real whinny)
  const highRatio = 1 + splitAmount * 2.5;
  const highFreq = baseFreq * highRatio;
  oscHigh.frequency.linearRampToValueAtTime(highFreq, t + 0.05);
  filterHigh.frequency.linearRampToValueAtTime(highFreq, t + 0.05);

  // Volume: low voice always present, high voice fades in with split
  const masterVol = 0.12;
  gainLow.gain.linearRampToValueAtTime(masterVol * 0.7, t + 0.05);
  gainHigh.gain.linearRampToValueAtTime(masterVol * splitAmount * 0.6, t + 0.05);
}

function spawnParticle(x, y, freq, isHigh) {
  if (particles.length >= MAX_PARTICLES) return;
  const angle = Math.random() * Math.PI * 2;
  const speed = 0.5 + Math.random() * 1.5;
  particles.push({
    x, y,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    age: 0,
    maxAge: 2 + Math.random() * 3,
    freq,
    isHigh,
    radius: 1 + Math.random() * 2
  });
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.age += dt;
    if (p.age > p.maxAge) {
      particles.splice(i, 1);
      continue;
    }

    // Particles drift outward, modulated by their frequency
    const wave = Math.sin(p.age * p.freq * 0.02);
    p.x += p.vx * (1 + wave * 0.3);
    p.y += p.vy * (1 + wave * 0.3);

    // Slow down
    p.vx *= 0.998;
    p.vy *= 0.998;
  }
}

function render() {
  // Slight trail
  ctx.fillStyle = 'rgba(10, 10, 10, 0.15)';
  ctx.fillRect(0, 0, W, H);

  const cx = originX;
  const cy = originY;

  // The source — always one point
  const sourceGlow = 0.3 + Math.sin(time * 3) * 0.1;
  const sourceRadius = 4 + splitAmount * 2;

  // Draw combined waveform ring around source
  const ringRadius = 60 + splitAmount * 40;
  const steps = 180;

  // Low voice waveform — warm amber
  ctx.beginPath();
  for (let i = 0; i <= steps; i++) {
    const a = (i / steps) * Math.PI * 2;
    const wave = Math.sin(a * (3 + Math.floor(baseFreq / 60)) + time * baseFreq * 0.03);
    const r = ringRadius + wave * (8 + splitAmount * 15);
    const px = cx + Math.cos(a) * r;
    const py = cy + Math.sin(a) * r;
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.strokeStyle = `rgba(230, 160, 60, ${0.3 + splitAmount * 0.2})`;
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // High voice waveform — cool white/blue, only visible when split
  if (splitAmount > 0.05) {
    const highRatio = 1 + splitAmount * 2.5;
    const highRingRadius = ringRadius + 20 * splitAmount;

    ctx.beginPath();
    for (let i = 0; i <= steps; i++) {
      const a = (i / steps) * Math.PI * 2;
      const wave = Math.sin(a * (5 + Math.floor(baseFreq * highRatio / 60)) + time * baseFreq * highRatio * 0.03);
      const r = highRingRadius + wave * (5 + splitAmount * 12);
      const px = cx + Math.cos(a) * r;
      const py = cy + Math.sin(a) * r;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.strokeStyle = `rgba(180, 200, 240, ${splitAmount * 0.4})`;
    ctx.lineWidth = 1;
    ctx.stroke();

    // Interference pattern — where the two waves cross
    for (let i = 0; i < steps; i++) {
      const a = (i / steps) * Math.PI * 2;
      const waveLow = Math.sin(a * (3 + Math.floor(baseFreq / 60)) + time * baseFreq * 0.03);
      const waveHigh = Math.sin(a * (5 + Math.floor(baseFreq * highRatio / 60)) + time * baseFreq * highRatio * 0.03);
      const interference = waveLow * waveHigh;

      if (Math.abs(interference) > 0.5) {
        const r = ringRadius + 10 * splitAmount;
        const px = cx + Math.cos(a) * r;
        const py = cy + Math.sin(a) * r;
        const alpha = Math.abs(interference) * splitAmount * 0.3;

        ctx.beginPath();
        ctx.arc(px, py, 1.5, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 220, 180, ${alpha})`;
        ctx.fill();
      }
    }
  }

  // Particles
  for (const p of particles) {
    const life = p.age / p.maxAge;
    const alpha = life < 0.1 ? life / 0.1 : 1 - life;

    if (p.isHigh) {
      ctx.fillStyle = `rgba(180, 200, 240, ${alpha * 0.5 * splitAmount})`;
    } else {
      ctx.fillStyle = `rgba(230, 160, 60, ${alpha * 0.4})`;
    }
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius * (1 - life * 0.5), 0, Math.PI * 2);
    ctx.fill();
  }

  // Source point — always singular
  const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, sourceRadius * 8);
  gradient.addColorStop(0, `rgba(230, 180, 100, ${sourceGlow})`);
  gradient.addColorStop(0.3, `rgba(200, 150, 80, ${sourceGlow * 0.4})`);
  gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
  ctx.beginPath();
  ctx.arc(cx, cy, sourceRadius * 8, 0, Math.PI * 2);
  ctx.fillStyle = gradient;
  ctx.fill();

  // Core dot
  ctx.beginPath();
  ctx.arc(cx, cy, sourceRadius, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(240, 200, 120, ${0.6 + sourceGlow})`;
  ctx.fill();

  // Split indicator — thin line showing the separation
  if (splitAmount > 0.05) {
    const sepHeight = splitAmount * 80;
    ctx.beginPath();
    ctx.moveTo(cx, cy - sepHeight);
    ctx.lineTo(cx, cy + sepHeight);
    ctx.strokeStyle = `rgba(100, 100, 100, ${splitAmount * 0.15})`;
    ctx.lineWidth = 0.5;
    ctx.stroke();

    // Two small dots at the ends — the two voice sources
    const dotAlpha = splitAmount * 0.5;
    const dotR = 2 + splitAmount * 2;

    // Low voice dot (bottom, warm)
    ctx.beginPath();
    ctx.arc(cx, cy + sepHeight, dotR, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(230, 160, 60, ${dotAlpha})`;
    ctx.fill();

    // High voice dot (top, cool)
    ctx.beginPath();
    ctx.arc(cx, cy - sepHeight, dotR, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(180, 200, 240, ${dotAlpha})`;
    ctx.fill();
  }

  // Waveform at bottom — the combined signal
  const waveY = H - 60;
  const waveW = 200;
  const waveX = W / 2 - waveW / 2;
  const waveH = 30;

  ctx.beginPath();
  for (let i = 0; i < waveW; i++) {
    const t2 = time * 8 + i * 0.08;
    const low = Math.sin(t2 * 1.0) * (1 - splitAmount * 0.3);
    const high = Math.sin(t2 * (1 + splitAmount * 2.5)) * splitAmount * 0.7;
    const combined = (low + high) * waveH * 0.5;
    const px = waveX + i;
    const py = waveY + combined;
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.strokeStyle = `rgba(200, 170, 100, 0.2)`;
  ctx.lineWidth = 1;
  ctx.stroke();
}

function updateInfo() {
  if (!started) return;
  const lowHz = Math.round(baseFreq);
  const highRatio = 1 + splitAmount * 2.5;
  const highHz = Math.round(baseFreq * highRatio);
  const splitPct = Math.round(splitAmount * 100);

  if (splitAmount < 0.05) {
    infoEl.textContent = `${lowHz} Hz`;
  } else {
    infoEl.textContent = `low ${lowHz} Hz · high ${highHz} Hz · split ${splitPct}%`;
  }
}

// Interaction
let dragStartY = 0;

function handleStart(x, y) {
  if (!started) {
    hintEl.style.opacity = '0';
    started = true;
    if (!audioCtx) initAudio();
    updateAudio();
  }
  dragging = true;
  dragStartY = y;
  mouseX = x / W;
}

function handleMove(x, y) {
  mouseX = x / W;
  mouseY = y / H;

  if (dragging) {
    // Vertical drag controls split
    const dy = (dragStartY - y) / (H * 0.4); // drag up to split
    targetSplit = Math.max(0, Math.min(1, dy));
  }
}

function handleEnd() {
  dragging = false;
  // Slowly merge back
  targetSplit = 0;
}

canvas.addEventListener('mousedown', (e) => handleStart(e.clientX, e.clientY));
canvas.addEventListener('mousemove', (e) => handleMove(e.clientX, e.clientY));
canvas.addEventListener('mouseup', handleEnd);
canvas.addEventListener('mouseleave', handleEnd);

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  handleStart(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  handleMove(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });
canvas.addEventListener('touchend', handleEnd);

// Main loop
let lastTime = 0;
function frame(t) {
  const dt = lastTime ? Math.min((t - lastTime) / 1000, 0.05) : 0.016;
  lastTime = t;
  time += dt;

  // Smooth split interpolation
  splitAmount += (targetSplit - splitAmount) * (dragging ? 8 : 2) * dt;
  if (Math.abs(splitAmount - targetSplit) < 0.001) splitAmount = targetSplit;

  if (started) {
    updateAudio();

    // Spawn particles from source
    if (Math.random() < 0.3) {
      spawnParticle(originX, originY, baseFreq, false);
    }
    if (splitAmount > 0.1 && Math.random() < splitAmount * 0.3) {
      spawnParticle(originX, originY, baseFreq * (1 + splitAmount * 2.5), true);
    }
  }

  updateParticles(dt);
  render();

  if (Math.floor(t / 200) !== Math.floor((t - dt * 1000) / 200)) {
    updateInfo();
  }

  requestAnimationFrame(frame);
}

resize();
window.addEventListener('resize', resize);
requestAnimationFrame(frame);
</script>
</body>
</html>
