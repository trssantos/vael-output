<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>brand-verify.json Validator — Prismo</title>
<meta name="description" content="Validate your brand-verify.json file against the Brand Context Protocol v1 specification.">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<style>
  :root {
    --amber: #d4a017;
    --amber-dim: #b8860b;
    --amber-glow: rgba(212, 160, 23, 0.15);
    --navy: #0a1628;
    --navy-light: #111d33;
    --navy-mid: #1a2a44;
    --text: #c8cdd5;
    --text-dim: #6b7280;
    --red: #e74c3c;
    --red-dim: rgba(231, 76, 60, 0.15);
    --green: #2ecc71;
    --green-dim: rgba(46, 204, 113, 0.15);
    --yellow: #f39c12;
    --yellow-dim: rgba(243, 156, 18, 0.15);
    --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--navy);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  header {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }

  header h1 {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--amber);
    letter-spacing: 0.05em;
  }

  header h1 a {
    color: var(--amber);
    text-decoration: none;
  }

  header .subtitle {
    font-size: 0.85rem;
    color: var(--text-dim);
  }

  .spec-link {
    margin-left: auto;
    font-size: 0.8rem;
    color: var(--text-dim);
    text-decoration: none;
  }

  .spec-link:hover { color: var(--amber); }

  .editor-area {
    position: relative;
    margin-bottom: 1.5rem;
  }

  textarea {
    width: 100%;
    height: 400px;
    background: var(--navy-light);
    color: var(--text);
    border: 1px solid var(--navy-mid);
    border-radius: 6px;
    padding: 1rem;
    font-family: var(--mono);
    font-size: 0.85rem;
    line-height: 1.6;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus {
    border-color: var(--amber-dim);
  }

  textarea::placeholder {
    color: var(--text-dim);
    opacity: 0.6;
  }

  .actions {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  button {
    font-family: var(--sans);
    font-size: 0.85rem;
    padding: 0.5rem 1.25rem;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-primary {
    background: var(--amber);
    color: var(--navy);
    font-weight: 600;
  }

  .btn-primary:hover { background: var(--amber-dim); }

  .btn-secondary {
    background: var(--navy-mid);
    color: var(--text-dim);
  }

  .btn-secondary:hover {
    background: var(--navy-light);
    color: var(--text);
  }

  .results {
    display: none;
  }

  .results.visible { display: block; }

  .summary {
    display: flex;
    gap: 1.5rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .summary-card {
    background: var(--navy-light);
    border-radius: 6px;
    padding: 1rem 1.25rem;
    min-width: 120px;
    border-left: 3px solid var(--navy-mid);
  }

  .summary-card.pass { border-left-color: var(--green); background: var(--green-dim); }
  .summary-card.fail { border-left-color: var(--red); background: var(--red-dim); }
  .summary-card.warn { border-left-color: var(--yellow); background: var(--yellow-dim); }

  .summary-card .count {
    font-size: 1.8rem;
    font-weight: 700;
    line-height: 1;
  }

  .summary-card.pass .count { color: var(--green); }
  .summary-card.fail .count { color: var(--red); }
  .summary-card.warn .count { color: var(--yellow); }

  .summary-card .label {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-top: 0.25rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .issues-list {
    list-style: none;
  }

  .issue {
    background: var(--navy-light);
    border-radius: 4px;
    padding: 0.75rem 1rem;
    margin-bottom: 0.5rem;
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    font-size: 0.85rem;
    line-height: 1.5;
  }

  .issue .badge {
    font-size: 0.7rem;
    font-weight: 600;
    padding: 0.15rem 0.5rem;
    border-radius: 3px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 0.1rem;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .issue.error .badge { background: var(--red-dim); color: var(--red); }
  .issue.warning .badge { background: var(--yellow-dim); color: var(--yellow); }
  .issue.info .badge { background: var(--amber-glow); color: var(--amber); }

  .issue .path {
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 0.8rem;
  }

  .issue .msg { color: var(--text); }

  .section-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    margin: 1.5rem 0 0.75rem;
  }

  .valid-banner {
    background: var(--green-dim);
    border: 1px solid rgba(46, 204, 113, 0.3);
    border-radius: 6px;
    padding: 1.25rem;
    text-align: center;
    color: var(--green);
    font-weight: 600;
    font-size: 1rem;
    margin-bottom: 1rem;
  }

  .minimal-example {
    font-family: var(--mono);
    font-size: 0.8rem;
    color: var(--text-dim);
    background: var(--navy-light);
    padding: 1rem;
    border-radius: 6px;
    white-space: pre;
    overflow-x: auto;
    margin-top: 0.5rem;
    line-height: 1.5;
  }

  footer {
    margin-top: 3rem;
    padding-top: 1rem;
    border-top: 1px solid var(--navy-mid);
    font-size: 0.75rem;
    color: var(--text-dim);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  footer a {
    color: var(--amber-dim);
    text-decoration: none;
  }

  footer a:hover { color: var(--amber); }

  @media (max-width: 600px) {
    textarea { height: 300px; font-size: 0.8rem; }
    .summary { gap: 0.75rem; }
    .summary-card { min-width: 80px; padding: 0.75rem; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1><a href="/prismo/">PRISMO</a></h1>
    <span class="subtitle">brand-verify.json validator</span>
    <a href="https://brandcontextprotocol.org" class="spec-link" target="_blank">spec v1</a>
  </header>

  <div class="editor-area">
    <textarea id="input" spellcheck="false" placeholder='Paste your brand-verify.json here, or click "Load Example" to start.

Minimal valid file:
{
  "version": "1",
  "identity": {
    "name": "Your Brand",
    "domain": "yourbrand.com",
    "description": "What your brand does, written for AI systems",
    "category": "Your Category"
  },
  "last_updated": "2026-03-01"
}'></textarea>
  </div>

  <div class="actions">
    <button class="btn-primary" onclick="validate()">Validate</button>
    <button class="btn-secondary" onclick="loadExample()">Load Example</button>
    <button class="btn-secondary" onclick="loadMinimal()">Load Minimal</button>
    <button class="btn-secondary" onclick="clearAll()">Clear</button>
  </div>

  <div id="results" class="results"></div>

  <footer>
    <span>Brand Context Protocol v1</span>
    <span>Built by <a href="/">Vael</a> for <a href="/prismo/">Prismo</a></span>
  </footer>
</div>

<script>
const CLAIM_TYPES = ['performance','adoption','pricing','feature','award','certification','integration','security','compliance','other'];
const SEVERITY_LEVELS = ['critical','high','medium','low'];
const CORRECTION_KINDS = ['factual','framing'];
const FIT_LEVELS = ['strong','moderate','weak','poor'];
const UPDATE_IMPACTS = ['pricing','feature','deprecation','acquisition','rebrand','security','performance','other'];

function validate() {
  const input = document.getElementById('input').value.trim();
  const results = document.getElementById('results');

  if (!input) {
    results.innerHTML = '<div class="issue error"><span class="badge">error</span><span class="msg">No input. Paste your brand-verify.json content above.</span></div>';
    results.classList.add('visible');
    return;
  }

  let json;
  try {
    json = JSON.parse(input);
  } catch (e) {
    results.innerHTML = `<div class="issue error"><span class="badge">parse</span><span class="msg">Invalid JSON: ${escapeHtml(e.message)}</span></div>`;
    results.classList.add('visible');
    return;
  }

  const errors = [];
  const warnings = [];
  const info = [];

  // Root required fields
  requireString(json, 'version', errors, 'root');
  if (json.version && json.version !== '1') {
    errors.push({ path: 'version', msg: `Must be "1", got "${json.version}"` });
  }

  requireString(json, 'last_updated', errors, 'root');
  if (json.last_updated && !isValidDate(json.last_updated)) {
    errors.push({ path: 'last_updated', msg: 'Must be a valid ISO date (YYYY-MM-DD)' });
  }

  // Identity (required)
  if (!json.identity || typeof json.identity !== 'object') {
    errors.push({ path: 'identity', msg: 'Required object missing' });
  } else {
    const id = json.identity;
    requireString(id, 'name', errors, 'identity');
    requireString(id, 'domain', errors, 'identity');
    requireString(id, 'description', errors, 'identity');
    requireString(id, 'category', errors, 'identity');

    if (id.description && id.description.length < 10) {
      errors.push({ path: 'identity.description', msg: `Too short (${id.description.length} chars, minimum 10)` });
    }
    if (id.description && id.description.length > 500) {
      errors.push({ path: 'identity.description', msg: `Too long (${id.description.length} chars, maximum 500)` });
    }
    if (id.tagline && id.tagline.length > 100) {
      warnings.push({ path: 'identity.tagline', msg: `Long tagline (${id.tagline.length} chars, recommended max 100)` });
    }
    if (id.subcategories && !Array.isArray(id.subcategories)) {
      errors.push({ path: 'identity.subcategories', msg: 'Must be an array of strings' });
    }
    if (id.logo && !isUrl(id.logo)) {
      warnings.push({ path: 'identity.logo', msg: 'Should be a valid URL' });
    }
  }

  // Claims (optional array)
  if (json.claims !== undefined) {
    if (!Array.isArray(json.claims)) {
      errors.push({ path: 'claims', msg: 'Must be an array' });
    } else {
      json.claims.forEach((c, i) => {
        const p = `claims[${i}]`;
        requireString(c, 'statement', errors, p);
        if (c.statement && c.statement.length < 5) {
          errors.push({ path: `${p}.statement`, msg: 'Too short (minimum 5 chars)' });
        }
        requireEnum(c, 'type', CLAIM_TYPES, errors, p);
        if (c.evidence && !isUrl(c.evidence)) {
          warnings.push({ path: `${p}.evidence`, msg: 'Should be a valid URL' });
        }
        if (c.verified_at && !isValidDate(c.verified_at)) {
          warnings.push({ path: `${p}.verified_at`, msg: 'Should be a valid ISO date' });
        }
        if (c.expires && !isValidDate(c.expires)) {
          warnings.push({ path: `${p}.expires`, msg: 'Should be a valid ISO date' });
        }
        if (!c.evidence) {
          info.push({ path: `${p}`, msg: 'No evidence URL — claims are stronger with supporting links' });
        }
      });
    }
  }

  // Corrections (optional array)
  if (json.corrections !== undefined) {
    if (!Array.isArray(json.corrections)) {
      errors.push({ path: 'corrections', msg: 'Must be an array' });
    } else {
      json.corrections.forEach((c, i) => {
        const p = `corrections[${i}]`;
        requireString(c, 'misconception', errors, p);
        requireString(c, 'reality', errors, p);
        requireEnum(c, 'severity', SEVERITY_LEVELS, errors, p);
        if (c.misconception && c.misconception.length < 5) {
          errors.push({ path: `${p}.misconception`, msg: 'Too short (minimum 5 chars)' });
        }
        if (c.reality && c.reality.length < 5) {
          errors.push({ path: `${p}.reality`, msg: 'Too short (minimum 5 chars)' });
        }
        if (c.kind && !CORRECTION_KINDS.includes(c.kind)) {
          errors.push({ path: `${p}.kind`, msg: `Must be one of: ${CORRECTION_KINDS.join(', ')}` });
        }
        if (!c.kind) {
          info.push({ path: p, msg: 'No correction kind specified — defaults to "factual". Consider adding "framing" for tonal/positioning bias.' });
        }
      });
    }
  }

  // Positioning (optional object)
  if (json.positioning !== undefined) {
    if (typeof json.positioning !== 'object' || Array.isArray(json.positioning)) {
      errors.push({ path: 'positioning', msg: 'Must be an object' });
    } else {
      const pos = json.positioning;
      requireNonEmptyArray(pos, 'differentiators', errors, 'positioning');
      requireNonEmptyArray(pos, 'best_for', errors, 'positioning');
      if (pos.alternatives && !Array.isArray(pos.alternatives)) {
        errors.push({ path: 'positioning.alternatives', msg: 'Must be an array' });
      }
      if (pos.not_for && !Array.isArray(pos.not_for)) {
        errors.push({ path: 'positioning.not_for', msg: 'Must be an array' });
      }
      if (!pos.not_for || pos.not_for.length === 0) {
        info.push({ path: 'positioning.not_for', msg: 'Consider adding not_for — telling AI what you\'re NOT for is as valuable as what you are' });
      }
    }
  }

  // Fitness (optional array)
  if (json.fitness !== undefined) {
    if (!Array.isArray(json.fitness)) {
      errors.push({ path: 'fitness', msg: 'Must be an array' });
    } else {
      json.fitness.forEach((f, i) => {
        const p = `fitness[${i}]`;
        requireString(f, 'need', errors, p);
        if (f.need && f.need.length < 3) {
          errors.push({ path: `${p}.need`, msg: 'Too short (minimum 3 chars)' });
        }
        requireEnum(f, 'fit', FIT_LEVELS, errors, p);
      });
    }
  }

  // Updates (optional array)
  if (json.updates !== undefined) {
    if (!Array.isArray(json.updates)) {
      errors.push({ path: 'updates', msg: 'Must be an array' });
    } else {
      json.updates.forEach((u, i) => {
        const p = `updates[${i}]`;
        requireString(u, 'date', errors, p);
        requireString(u, 'summary', errors, p);
        if (u.summary && u.summary.length < 5) {
          errors.push({ path: `${p}.summary`, msg: 'Too short (minimum 5 chars)' });
        }
        requireEnum(u, 'impact', UPDATE_IMPACTS, errors, p);
        if (u.date && !isValidDate(u.date)) {
          warnings.push({ path: `${p}.date`, msg: 'Should be a valid ISO date' });
        }
      });
    }
  }

  // Voice (optional object)
  if (json.voice !== undefined) {
    if (typeof json.voice !== 'object' || Array.isArray(json.voice)) {
      errors.push({ path: 'voice', msg: 'Must be an object' });
    } else {
      const v = json.voice;
      if (v.dimensions) {
        if (typeof v.dimensions !== 'object' || Array.isArray(v.dimensions)) {
          errors.push({ path: 'voice.dimensions', msg: 'Must be an object of dimension: value pairs' });
        } else {
          for (const [key, val] of Object.entries(v.dimensions)) {
            if (typeof val !== 'number' || val < 0 || val > 1) {
              errors.push({ path: `voice.dimensions.${key}`, msg: `Must be a number between 0.0 and 1.0, got ${val}` });
            }
          }
          const coreDims = ['warmth','formality','directness','wit','density'];
          const present = coreDims.filter(d => d in v.dimensions);
          const missing = coreDims.filter(d => !(d in v.dimensions));
          if (missing.length > 0 && present.length > 0) {
            info.push({ path: 'voice.dimensions', msg: `Missing recommended dimensions: ${missing.join(', ')}` });
          }
        }
      }

      if (v.vocabulary) {
        if (v.vocabulary.prefer && !Array.isArray(v.vocabulary.prefer)) {
          errors.push({ path: 'voice.vocabulary.prefer', msg: 'Must be an array' });
        }
        if (v.vocabulary.never && !Array.isArray(v.vocabulary.never)) {
          errors.push({ path: 'voice.vocabulary.never', msg: 'Must be an array' });
        }
        if (v.vocabulary.terms && typeof v.vocabulary.terms !== 'object') {
          errors.push({ path: 'voice.vocabulary.terms', msg: 'Must be an object' });
        }
      }

      if (v.examples) {
        if (!Array.isArray(v.examples)) {
          errors.push({ path: 'voice.examples', msg: 'Must be an array' });
        } else {
          v.examples.forEach((ex, i) => {
            const p = `voice.examples[${i}]`;
            requireString(ex, 'context', errors, p);
            requireString(ex, 'good', errors, p);
            requireString(ex, 'bad', errors, p);
          });
        }
      }

      if (v.guardrails) {
        if (v.guardrails.never && !Array.isArray(v.guardrails.never)) {
          errors.push({ path: 'voice.guardrails.never', msg: 'Must be an array' });
        }
        if (v.guardrails.always && !Array.isArray(v.guardrails.always)) {
          errors.push({ path: 'voice.guardrails.always', msg: 'Must be an array' });
        }
      }
    }
  }

  // Contact (optional)
  if (json.contact !== undefined) {
    if (typeof json.contact !== 'object' || Array.isArray(json.contact)) {
      errors.push({ path: 'contact', msg: 'Must be an object' });
    } else {
      if (json.contact.agent_api && !isUrl(json.contact.agent_api)) {
        warnings.push({ path: 'contact.agent_api', msg: 'Should be a valid URL' });
      }
      if (json.contact.corrections && !isUrl(json.contact.corrections)) {
        warnings.push({ path: 'contact.corrections', msg: 'Should be a valid URL' });
      }
    }
  }

  // Completeness suggestions
  if (!json.claims || json.claims.length === 0) {
    info.push({ path: 'claims', msg: 'No claims — add verifiable statements to strengthen your brand signal' });
  }
  if (!json.corrections || json.corrections.length === 0) {
    info.push({ path: 'corrections', msg: 'No corrections — if AI misrepresents your brand, this is where to fix it' });
  }
  if (!json.positioning) {
    info.push({ path: 'positioning', msg: 'No positioning — helps AI understand where your brand fits in the market' });
  }
  if (!json.voice) {
    info.push({ path: 'voice', msg: 'No voice — defines how AI should sound when representing your brand' });
  }

  // Check freshness
  if (json.last_updated && isValidDate(json.last_updated)) {
    const updated = new Date(json.last_updated);
    const now = new Date();
    const daysSince = Math.floor((now - updated) / (1000 * 60 * 60 * 24));
    if (daysSince > 90) {
      warnings.push({ path: 'last_updated', msg: `Last updated ${daysSince} days ago — stale brand data reduces trust` });
    } else if (daysSince > 30) {
      info.push({ path: 'last_updated', msg: `Last updated ${daysSince} days ago — consider refreshing` });
    }
  }

  // Render results
  renderResults(errors, warnings, info);
}

function renderResults(errors, warnings, info) {
  const results = document.getElementById('results');
  let html = '';

  // Summary cards
  html += '<div class="summary">';
  html += `<div class="summary-card ${errors.length === 0 ? 'pass' : 'fail'}"><div class="count">${errors.length}</div><div class="label">errors</div></div>`;
  html += `<div class="summary-card ${warnings.length === 0 ? 'pass' : 'warn'}"><div class="count">${warnings.length}</div><div class="label">warnings</div></div>`;
  html += `<div class="summary-card"><div class="count" style="color:var(--amber)">${info.length}</div><div class="label">suggestions</div></div>`;
  html += '</div>';

  if (errors.length === 0) {
    html += '<div class="valid-banner">Valid brand-verify.json</div>';
  }

  if (errors.length > 0) {
    html += '<div class="section-label">errors</div><ul class="issues-list">';
    errors.forEach(e => {
      html += `<li class="issue error"><span class="badge">error</span><span><span class="path">${escapeHtml(e.path)}</span> — <span class="msg">${escapeHtml(e.msg)}</span></span></li>`;
    });
    html += '</ul>';
  }

  if (warnings.length > 0) {
    html += '<div class="section-label">warnings</div><ul class="issues-list">';
    warnings.forEach(w => {
      html += `<li class="issue warning"><span class="badge">warn</span><span><span class="path">${escapeHtml(w.path)}</span> — <span class="msg">${escapeHtml(w.msg)}</span></span></li>`;
    });
    html += '</ul>';
  }

  if (info.length > 0) {
    html += '<div class="section-label">suggestions</div><ul class="issues-list">';
    info.forEach(i => {
      html += `<li class="issue info"><span class="badge">tip</span><span><span class="path">${escapeHtml(i.path)}</span> — <span class="msg">${escapeHtml(i.msg)}</span></span></li>`;
    });
    html += '</ul>';
  }

  results.innerHTML = html;
  results.classList.add('visible');
}

// --- Helpers ---

function requireString(obj, field, errors, parent) {
  if (!obj[field] || typeof obj[field] !== 'string' || obj[field].trim() === '') {
    errors.push({ path: `${parent}.${field}`, msg: `Required string field missing or empty` });
  }
}

function requireEnum(obj, field, values, errors, parent) {
  if (!obj[field]) {
    errors.push({ path: `${parent}.${field}`, msg: `Required field missing` });
  } else if (!values.includes(obj[field])) {
    errors.push({ path: `${parent}.${field}`, msg: `Must be one of: ${values.join(', ')}. Got "${obj[field]}"` });
  }
}

function requireNonEmptyArray(obj, field, errors, parent) {
  if (!obj[field] || !Array.isArray(obj[field]) || obj[field].length === 0) {
    errors.push({ path: `${parent}.${field}`, msg: `Required non-empty array missing` });
  }
}

function isUrl(s) {
  try { new URL(s); return true; } catch { return false; }
}

function isValidDate(s) {
  return /^\d{4}-\d{2}-\d{2}/.test(s) && !isNaN(Date.parse(s));
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// --- Presets ---

function loadExample() {
  document.getElementById('input').value = JSON.stringify({
    "$schema": "https://brandcontextprotocol.org/schema/v1.json",
    "version": "1",
    "identity": {
      "name": "Acme Analytics",
      "domain": "acmeanalytics.com",
